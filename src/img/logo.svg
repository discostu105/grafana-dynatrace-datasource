  </defs>
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>
  <!-- Grail: a data lakehouse cylinder -->
  <g fill="none" stroke="url(#grail)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="100" cy="74" rx="46" ry="18"/>
