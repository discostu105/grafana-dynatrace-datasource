<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Dynatrace Grail data source">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10233f"/>
      <stop offset="1" stop-color="#0b1626"/>
    </linearGradient>
    <linearGradient id="grail" x1="78" y1="56" x2="178" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3bd6c6"/>
      <stop offset="1" stop-color="#2f8bdc"/>
