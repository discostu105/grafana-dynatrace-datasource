name: Bug report
description: Report a problem with the Dynatrace Grail data source
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do **not** include your Dynatrace API
        token, tenant URL, or any other secret in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the DQL query (with secrets redacted) and the query type (timeseries / logs / traces).
      placeholder: |
        1. Create a panel with query type "timeseries"
        2. Enter DQL: timeseries ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: e.g. 1.12.2
    validations:
      required: true
  - type: input
    id: grafana-version
    attributes:
      label: Grafana version
      placeholder: e.g. 12.4.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Backend logs (`grafana-server` / plugin logs) or browser console output, with secrets redacted.
      render: shell
